<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🦞 랍스타 군단: 컨트롤 센터</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #eee; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        select, input, textarea { width: 95%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #333; color: white; font-family: inherit; }
        button { background: #ff4757; color: white; border: none; padding: 15px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; margin-top: 10px; }
        .btn-small { background: #3742fa; padding: 10px; font-size: 0.9em; width: auto; display: inline-block; }
        button:hover { filter: brightness(1.1); }
        .info-text { font-size: 0.85em; color: #ffa502; margin-bottom: 10px; }
        .section-title { color: #ff4757; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>

    <h1>🦞 Lobster Control Center</h1>

    <div class="card">
        <h3 class="section-title">1. 깃허브 브릿지 연결 (필수)</h3>
        <p class="info-text">모든 정보는 브라우저 로컬스토리지에만 안전하게 저장됩니다.</p>
        <input type="text" id="GITHUB_USER" placeholder="GitHub 아이디 (예: myusername)">
        <input type="text" id="REPO_NAME" placeholder="레포지토리 이름 (예: lobster-army)">
        <input type="password" id="GITHUB_PAT" placeholder="GitHub PAT (workflow 권한 필요)">
    </div>

    <div class="card">
        <h3 class="section-title">2. 뇌(Groq) & 손발(Gemini) 실시간 선택</h3>
        <p class="info-text">깃허브에 저장된 최신 모델 리스트를 불러옵니다. (시크릿 키 필요 없음!)</p>
        <button class="btn-small" onclick="fetchModels()">🔄 깃허브에서 최신 모델 리스트 불러오기</button>
        
        <label style="display:block; margin-top:20px; color:#ffa502; font-weight:bold;">🧠 사고력: Groq 모델</label>
        <select id="modelSelect"><option value="">먼저 리스트를 불러오세요...</option></select>
        
        <label style="display:block; margin-top:15px; color:#00a8ff; font-weight:bold;">👐 실행력: Gemini 모델</label>
        <select id="geminiModelSelect"><option value="">먼저 리스트를 불러오세요...</option></select>
    </div>

    <div class="card">
        <h3 class="section-title">3. 직무 할당 및 무료 도구 연결</h3>
        <select id="taskSelect" onchange="updateTaskFields()">
            <option value="ops_risk">BPO Ops / Risk Management (Contract, Crawler)</option>
            <option value="coding">Coding / Developer (GitHub, News API)</option>
            <option value="contents">Contents Creator (Pixabay, YouTube API)</option>
            <option value="data">Data Analysis / Documentation (CoinGecko, Sheets)</option>
        </select>
        <div id="apiFields"></div>
    </div>

    <div class="card" style="border: 2px solid #ff4757;">
        <h3 class="section-title">💬 랍스타에게 말걸기</h3>
        <p class="info-text">일상적인 인사를 건네면 대화만 하고, 업무를 지시하면 스스로 계획을 세워 실행합니다.</p>
        <textarea id="USER_MESSAGE" rows="3" placeholder="예: 안녕? 오늘 하루 어때? / 이번 주 크립토 동향 리포트 좀 써줘"></textarea>
    </div>

    <div class="card">
        <button onclick="saveAndRun()">🚀 명령 전송 및 랍스타 깨우기</button>
    </div>

    <script>
        const taskApis = {
            "ops_risk": ["RISK_RADAR_ENDPOINT", "CRAWLER_API_KEY"],
            "coding": ["NEWS_API_KEY"],
            "contents": ["YOUTUBE_API_KEY", "PIXABAY_KEY"],
            "data": ["OPENWEATHER_KEY"]
        };

        // 페이지 로드 시 로컬스토리지 값 복원
        window.onload = () => {
            ["GITHUB_USER", "REPO_NAME", "GITHUB_PAT", "taskSelect"].forEach(id => {
                if(localStorage.getItem(id)) document.getElementById(id).value = localStorage.getItem(id);
            });
            updateTaskFields();
            
            // 깃허브 정보가 있으면 자동으로 모델 리스트 가져오기
            if(document.getElementById("GITHUB_USER").value && document.getElementById("REPO_NAME").value) {
                fetchModels();
            }
        };

        // Groq 및 Gemini 모델 리스트를 깃허브(Raw URL)에서 가져옵니다.
        async function fetchModels() {
            const user = document.getElementById("GITHUB_USER").value;
            const repo = document.getElementById("REPO_NAME").value;

            if (!user || !repo) {
                alert("깃허브 아이디와 레포지토리 이름을 먼저 입력해주세요!"); return;
            }

            const groqSelect = document.getElementById("modelSelect");
            const geminiSelect = document.getElementById("geminiModelSelect");
            
            groqSelect.innerHTML = '<option>Groq 모델 불러오는 중...</option>';
            geminiSelect.innerHTML = '<option>Gemini 모델 불러오는 중...</option>';

            const timestamp = new Date().getTime(); // 캐시 무시용

            // 1. Groq 모델 파싱
            try {
                const groqRes = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/models.json?t=${timestamp}`);
                if (!groqRes.ok) throw new Error("Groq 모델 파일 없음");
                
                const groqData = await groqRes.json();
                groqSelect.innerHTML = '';
                groqData.data.filter(m => !m.id.includes("whisper")).forEach(model => {
                    const option = document.createElement("option");
                    option.value = model.id;
                    option.text = model.id;
                    if(localStorage.getItem("modelSelect") === model.id) option.selected = true;
                    groqSelect.appendChild(option);
                });
            } catch (e) {
                groqSelect.innerHTML = '<option value="">Groq 리스트를 불러오지 못했습니다. 봇을 먼저 실행하세요!</option>';
            }

            // 2. Gemini 모델 파싱
            try {
                const geminiRes = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/gemini_models.json?t=${timestamp}`);
                if (!geminiRes.ok) throw new Error("Gemini 모델 파일 없음");
                
                const geminiData = await geminiRes.json();
                geminiSelect.innerHTML = '';
                geminiData.models.filter(m => m.supportedGenerationMethods.includes("generateContent")).forEach(model => {
                    const option = document.createElement("option");
                    option.value = model.name; // 예: models/gemini-1.5-flash
                    option.text = `${model.name.replace('models/', '')} (${model.version})`;
                    if(localStorage.getItem("geminiModelSelect") === model.name) option.selected = true;
                    geminiSelect.appendChild(option);
                });
            } catch (e) {
                geminiSelect.innerHTML = '<option value="">Gemini 리스트를 불러오지 못했습니다. 봇을 먼저 실행하세요!</option>';
            }
        }

        function updateTaskFields() {
            const task = document.getElementById('taskSelect').value;
            const container = document.getElementById('apiFields');
            let html = '<p class="info-text">선택한 직무에 필요한 추가 API 키를 입력하세요 (선택사항).</p>';
            taskApis[task].forEach(field => {
                const val = localStorage.getItem(field) || "";
                html += `<label>${field}</label><input type="password" class="extra-api" id="${field}" value="${val}">`;
            });
            container.innerHTML = html;
        }

        async function saveAndRun() {
            // 기본 세팅값 로컬스토리지에 저장
            ["GITHUB_USER", "REPO_NAME", "GITHUB_PAT", "modelSelect", "geminiModelSelect", "taskSelect"].forEach(id => {
                if (document.getElementById(id)) {
                    localStorage.setItem(id, document.getElementById(id).value);
                }
            });

            // 동적 API 키 로컬스토리지 저장 및 JSON 객체화
            let extraKeys = {};
            document.querySelectorAll('.extra-api').forEach(input => {
                localStorage.setItem(input.id, input.value);
                extraKeys[input.id] = input.value;
            });

            const user = document.getElementById("GITHUB_USER").value;
            const repo = document.getElementById("REPO_NAME").value;
            const pat = document.getElementById("GITHUB_PAT").value;
            const model = document.getElementById("modelSelect").value;
            const gemini_model = document.getElementById("geminiModelSelect").value;
            const task = document.getElementById("taskSelect").value;
            const user_message = document.getElementById("USER_MESSAGE").value || "안녕?";

            if (!pat || !user || !repo || !model || !gemini_model) {
                alert("필수 정보(깃허브 브릿지 및 두 가지 모델 선택)를 모두 확인해주세요!"); return;
            }

            // 깃허브 액션 트리거 호출
            const url = `https://api.github.com/repos/${user}/${repo}/actions/workflows/lobster_army.yml/dispatches`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: { 
                            user_message: user_message,
                            model: model, 
                            gemini_model: gemini_model,
                            task: task, 
                            extra_keys: JSON.stringify(extraKeys) 
                        }
                    })
                });

                if (response.ok) alert("🚀 메시지 전송 완료! 디스코드를 확인하세요. ㅋㅋ");
                else { const err = await response.json(); alert("호출 실패: " + err.message); }
            } catch (e) { alert("네트워크 에러: " + e.message); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🦞 랍스타 군단: 컨트롤 센터</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #eee; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        select, input, textarea { width: 95%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #333; color: white; font-family: inherit; box-sizing: border-box; }
        button { background: #ff4757; color: white; border: none; padding: 15px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; }
        .btn-small { background: #3742fa; padding: 8px 12px; font-size: 0.9em; width: auto; display: inline-block; margin-top:0; border-radius: 4px; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #555; cursor: not-allowed; }
        .info-text { font-size: 0.85em; color: #ffa502; margin-bottom: 10px; }
        .section-title { color: #ff4757; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        
        /* 채팅방 전용 CSS */
        .chat-container { height: 450px; overflow-y: auto; background: #1e1e1e; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; display: flex; flex-direction: column; }
        .message { margin-bottom: 12px; max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; word-wrap: break-word; font-size: 0.95em; white-space: pre-wrap; }
        .msg-user { background: #3742fa; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .msg-bot { background: #333; color: #eee; margin-right: auto; border-bottom-left-radius: 2px; border-left: 4px solid #ff4757; }
        
        /* 입력 중 애니메이션 */
        .typing-indicator { display: flex; gap: 5px; padding: 10px; align-items: center; opacity: 0.7; }
        .dot { width: 8px; height: 8px; background: #ff4757; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .chat-input-wrapper { display: flex; gap: 10px; align-items: stretch; }
        .chat-input-wrapper textarea { flex: 1; margin: 0; resize: none; border-radius: 8px; }
        .chat-input-wrapper button { width: 120px; margin: 0; border-radius: 8px; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #ff4757;">🦞 Lobster Chat Center</h1>

    <details style="background: #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #444;">
        <summary style="cursor: pointer; color: #ffa502; font-weight: bold; font-size: 1.1em; outline: none;">⚙️ 시스템 설정 열기/닫기 (최초 1회 PAT 입력)</summary>
        
        <div style="margin-top: 20px;">
            <h3 class="section-title">1. 깃허브 브릿지 연결</h3>
            
            <div id="githubUserContainer">
                <input type="text" id="GITHUB_USER" placeholder="GitHub 아이디 (수동 입력용)">
            </div>
            <div id="repoNameContainer">
                <input type="text" id="REPO_NAME" placeholder="레포지토리 이름 (수동 입력용)">
            </div>
            
            <p class="info-text" id="autoDetectMsg" style="display:none; color: #2ed573;">✅ 깃허브 페이지 주소를 감지하여 아이디와 레포지토리가 자동 세팅되었습니다!</p>
            <input type="password" id="GITHUB_PAT" placeholder="🔑 GitHub PAT (workflow 권한) - 최초 1회만 입력">

            <h3 class="section-title" style="margin-top: 20px;">2. 모델 선택</h3>
            <button class="btn-small" onclick="fetchModels()">🔄 깃허브에서 리스트 불러오기</button>
            <select id="modelSelect" style="margin-top: 10px;"></select>
            <select id="geminiModelSelect"></select>

            <h3 class="section-title" style="margin-top: 20px;">3. 직무 할당</h3>
            <select id="taskSelect" onchange="updateTaskFields()">
                <option value="ops_risk">BPO Ops / Risk Management</option>
                <option value="coding">Coding / Developer</option>
                <option value="contents">Contents Creator</option>
                <option value="data">Data Analysis / Documentation</option>
            </select>
            <div id="apiFields"></div>
        </div>
    </details>

    <div class="card" style="border: 2px solid #ff4757; padding: 15px;">
        <h3 style="margin-top:0; border-bottom: 1px solid #444; padding-bottom: 10px;">💬 랍스타와 대화하기 (자동 동기화 됨)</h3>
        
        <div id="chatBox" class="chat-container"></div>

        <div class="chat-input-wrapper">
            <textarea id="USER_MESSAGE" rows="2" placeholder="메시지를 입력하세요... (엔터키로 줄바꿈)"></textarea>
            <button onclick="saveAndRun()" id="sendBtn">전송 🚀</button>
        </div>
        <p style="font-size: 0.8em; color: #888; margin-top: 10px; text-align: center;">* 랍스타가 답변을 작성하는 동안 창을 닫지 마세요. (약 15~20초 소요)</p>
    </div>

    <script>
        let currentMemoryLength = 0; 
        let autoPollInterval = null; 

        const taskApis = {
            "ops_risk": ["RISK_RADAR_ENDPOINT", "CRAWLER_API_KEY"],
            "coding": ["NEWS_API_KEY"],
            "contents": ["YOUTUBE_API_KEY", "PIXABAY_KEY"],
            "data": ["OPENWEATHER_KEY"]
        };

        window.onload = () => {
            // ★ 깃허브 페이지(웹 호스팅) 접속 여부 자동 감지 로직
            const isGitHubPages = window.location.hostname.includes("github.io");

            if (isGitHubPages) {
                // 주소창에서 아이디와 레포 이름 추출 (예: wongbin.github.io/lobster-army)
                const autoUser = window.location.hostname.split('.')[0];
                const autoRepo = window.location.pathname.split('/')[1] || "";

                document.getElementById("GITHUB_USER").value = autoUser;
                document.getElementById("REPO_NAME").value = autoRepo;

                // 화면에서 입력칸 날려버리기
                document.getElementById("githubUserContainer").style.display = "none";
                document.getElementById("repoNameContainer").style.display = "none";
                document.getElementById("autoDetectMsg").style.display = "block"; // 감지 성공 메시지 띄움
            } else {
                // 로컬에서 테스트할 때만 로컬스토리지에서 복원
                if(localStorage.getItem("GITHUB_USER")) document.getElementById("GITHUB_USER").value = localStorage.getItem("GITHUB_USER");
                if(localStorage.getItem("REPO_NAME")) document.getElementById("REPO_NAME").value = localStorage.getItem("REPO_NAME");
            }

            // PAT 및 기타 세팅 복원
            if(localStorage.getItem("GITHUB_PAT")) document.getElementById("GITHUB_PAT").value = localStorage.getItem("GITHUB_PAT");
            if(localStorage.getItem("taskSelect")) document.getElementById("taskSelect").value = localStorage.getItem("taskSelect");

            updateTaskFields();
            
            // 정보가 다 채워져 있다면 초기 데이터 로드 시작
            if(document.getElementById("GITHUB_USER").value && document.getElementById("REPO_NAME").value) {
                fetchModels();
                loadMemory(); 
            }
        };

        async function loadMemory() {
            const user = document.getElementById("GITHUB_USER").value;
            const repo = document.getElementById("REPO_NAME").value;
            const pat = document.getElementById("GITHUB_PAT").value; // PAT 열쇠 챙기기
            if (!user || !repo) return false;

            const chatBox = document.getElementById("chatBox");
            
            try {
                // 핵심: raw 주소가 아니라 api.github.com 주소를 찌릅니다.
                const url = `https://api.github.com/repos/${user}/${repo}/contents/memory.json`;
                
                let headers = { 
                    'Accept': 'application/vnd.github.v3.raw', // 파일 내용만 순수하게 달라는 옵션
                    'Cache-Control': 'no-cache' // 캐시 절대 금지!
                };
                // PAT가 있으면 VIP 패스로 인증해서 더 확실하게 최신본을 가져옵니다
                if (pat) headers['Authorization'] = `token ${pat}`;

                const res = await fetch(url + `?t=${new Date().getTime()}`, { headers: headers });
                
                if (!res.ok) throw new Error("기억 파일 없음");
                
                const history = await res.json();
                
                // 새로운 메시지가 추가되었는지 확인
                if (history.length > currentMemoryLength) {
                    currentMemoryLength = history.length;
                    
                    chatBox.innerHTML = ''; 
                    history.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `message ${msg.role === 'user' ? 'msg-user' : 'msg-bot'}`;
                        div.innerText = msg.content.replace("[CHAT]", "").replace("[TASK]", "").trim();
                        chatBox.appendChild(div);
                    });
                    
                    chatBox.scrollTop = chatBox.scrollHeight;
                    return true; 
                }
                return false;
            } catch (e) {
                if(currentMemoryLength === 0) {
                    chatBox.innerHTML = '<div class="message msg-bot">아직 대화 기록이 없습니다. 먼저 말을 걸어주세요! 🦞</div>';
                }
                return false;
            }
        }

        async function fetchModels() {
            const user = document.getElementById("GITHUB_USER").value;
            const repo = document.getElementById("REPO_NAME").value;
            if (!user || !repo) return;
            const timestamp = new Date().getTime();

            try {
                const groqRes = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/models.json?t=${timestamp}`);
                const groqData = await groqRes.json();
                const groqSelect = document.getElementById("modelSelect");
                groqSelect.innerHTML = '';
                groqData.data.filter(m => !m.id.includes("whisper")).forEach(model => {
                    groqSelect.innerHTML += `<option value="${model.id}" ${localStorage.getItem("modelSelect") === model.id ? 'selected' : ''}>${model.id}</option>`;
                });
            } catch (e) { }

            try {
                const geminiRes = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/gemini_models.json?t=${timestamp}`);
                const geminiData = await geminiRes.json();
                const geminiSelect = document.getElementById("geminiModelSelect");
                geminiSelect.innerHTML = '';
                geminiData.models.filter(m => m.supportedGenerationMethods.includes("generateContent")).forEach(model => {
                    geminiSelect.innerHTML += `<option value="${model.name}" ${localStorage.getItem("geminiModelSelect") === model.name ? 'selected' : ''}>${model.name.replace('models/', '')} (${model.version})</option>`;
                });
            } catch (e) { }
        }

        function updateTaskFields() {
            const task = document.getElementById('taskSelect').value;
            const container = document.getElementById('apiFields');
            let html = '<p class="info-text">추가 API 키 입력 (선택)</p>';
            taskApis[task].forEach(field => {
                const val = localStorage.getItem(field) || "";
                html += `<label>${field}</label><input type="password" class="extra-api" id="${field}" value="${val}">`;
            });
            container.innerHTML = html;
        }

        async function saveAndRun() {
            const btn = document.getElementById("sendBtn");
            const userMessageInput = document.getElementById("USER_MESSAGE");
            const message = userMessageInput.value.trim();
            const chatBox = document.getElementById("chatBox");

            if (!message) { alert("메시지를 입력해주세요!"); return; }

            // 내가 보낸 메시지 즉시 띄우기
            const myMsgDiv = document.createElement('div');
            myMsgDiv.className = 'message msg-user';
            myMsgDiv.innerText = message;
            chatBox.appendChild(myMsgDiv);
            
            // 랍스타 "입력 중..." 타이핑 애니메이션
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message msg-bot typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            btn.innerText = "전송 중...";
            btn.disabled = true;
            userMessageInput.value = '';

            // 설정값들 로컬스토리지에 저장
            if (!document.getElementById("githubUserContainer").style.display) {
                 localStorage.setItem("GITHUB_USER", document.getElementById("GITHUB_USER").value);
                 localStorage.setItem("REPO_NAME", document.getElementById("REPO_NAME").value);
            }
            localStorage.setItem("GITHUB_PAT", document.getElementById("GITHUB_PAT").value);
            localStorage.setItem("modelSelect", document.getElementById("modelSelect").value);
            localStorage.setItem("geminiModelSelect", document.getElementById("geminiModelSelect").value);
            localStorage.setItem("taskSelect", document.getElementById("taskSelect").value);

            let extraKeys = {};
            document.querySelectorAll('.extra-api').forEach(input => { localStorage.setItem(input.id, input.value); extraKeys[input.id] = input.value; });

            const user = document.getElementById("GITHUB_USER").value;
            const repo = document.getElementById("REPO_NAME").value;
            const pat = document.getElementById("GITHUB_PAT").value;

            if (!pat) {
                alert("GitHub PAT를 입력해주세요! (톱니바퀴 메뉴 확인)");
                btn.innerText = "전송 🚀";
                btn.disabled = false;
                document.getElementById('typingIndicator').remove();
                return;
            }

            const url = `https://api.github.com/repos/${user}/${repo}/actions/workflows/lobster_army.yml/dispatches`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: { 
                            user_message: message,
                            model: document.getElementById("modelSelect").value, 
                            gemini_model: document.getElementById("geminiModelSelect").value,
                            task: document.getElementById("taskSelect").value, 
                            extra_keys: JSON.stringify(extraKeys) 
                        }
                    })
                });

                if (response.ok) {
                    btn.innerText = "답변 대기중 ⏳";
                    
                    let pollCount = 0;
                    if(autoPollInterval) clearInterval(autoPollInterval);
                    
                    // 5초 간격으로 깃허브 메모리(일기장) 확인
                    autoPollInterval = setInterval(async () => {
                        pollCount++;
                        const isUpdated = await loadMemory();
                        
                        if (isUpdated || pollCount > 12) {
                            clearInterval(autoPollInterval);
                            const typingElem = document.getElementById('typingIndicator');
                            if(typingElem) typingElem.remove(); 
                            
                            btn.innerText = "전송 🚀";
                            btn.disabled = false;
                            
                            if (!isUpdated) {
                                const errDiv = document.createElement('div');
                                errDiv.className = 'message msg-bot';
                                errDiv.innerText = "❌ 답변이 지연되고 있습니다. 깃허브의 Actions 탭에서 에러를 확인해주세요.";
                                chatBox.appendChild(errDiv);
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        }
                    }, 5000); 

                } else { 
                    throw new Error("깃허브 액션 호출 권한이 없거나 에러가 발생했습니다.");
                }
            } catch (e) { 
                alert("에러: " + e.message); 
                btn.innerText = "전송 🚀";
                btn.disabled = false;
                const typingElem = document.getElementById('typingIndicator');
                if(typingElem) typingElem.remove();
            }
        }
    </script>
</body>
</html>

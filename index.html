<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🦞 랍스타 군단: 컨트롤 센터</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #eee; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        select, input { width: 95%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #333; color: white; }
        button { background: #ff4757; color: white; border: none; padding: 15px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; margin-top: 10px; }
        .btn-small { background: #3742fa; padding: 10px; font-size: 0.9em; width: auto; display: inline-block; }
        button:hover { filter: brightness(1.1); }
        .info-text { font-size: 0.85em; color: #ffa502; margin-bottom: 10px; }
        .section-title { color: #ff4757; border-bottom: 1px solid #444; padding-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🦞 Lobster Control Center</h1>

    <div class="card">
        <h3 class="section-title">1. 깃허브 브릿지 연결 (필수)</h3>
        <p class="info-text">모든 정보는 브라우저 로컬스토리지에만 안전하게 저장됩니다.</p>
        <input type="text" id="GITHUB_USER" placeholder="GitHub 아이디 (예: myusername)">
        <input type="text" id="REPO_NAME" placeholder="레포지토리 이름 (예: lobster-army)">
        <input type="password" id="GITHUB_PAT" placeholder="GitHub PAT (workflow 권한 필요)">
    </div>

    <div class="card">
        <h3 class="section-title">2. 뇌(Groq Model) 실시간 선택</h3>
        <p class="info-text">깃허브에 저장된 최신 모델 리스트를 불러옵니다. (시크릿 키 필요 없음!)</p>
        <button class="btn-small" onclick="fetchGroqModels()">🔄 깃허브에서 모델 목록 불러오기</button>
        
        <select id="modelSelect" onchange="updateModelDesc()" style="margin-top: 15px;">
            <option value="">먼저 모델 목록을 불러오세요...</option>
        </select>
        <div id="modelDesc" class="info-text" style="margin-top: 5px;"></div>
    </div>

    <div class="card">
        <h3 class="section-title">3. 직무 할당 및 무료 도구 연결</h3>
        <select id="taskSelect" onchange="updateTaskFields()">
            <option value="ops_risk">BPO Ops / Risk Management (Contract, Crawler)</option>
            <option value="coding">Coding / Developer (GitHub, News API)</option>
            <option value="contents">Contents Creator (Pixabay, YouTube API)</option>
            <option value="data">Data Analysis / Documentation (CoinGecko, Sheets)</option>
        </select>
        <div id="apiFields"></div>
    </div>

    <div class="card">
        <button onclick="saveAndRun()">🚀 설정 저장 및 랍스타 깨우기</button>
    </div>

    <script>
        const taskApis = {
            "ops_risk": ["RISK_RADAR_ENDPOINT", "CRAWLER_API_KEY"],
            "coding": ["NEWS_API_KEY"],
            "contents": ["YOUTUBE_API_KEY", "PIXABAY_KEY"],
            "data": ["OPENWEATHER_KEY"]
        };

        window.onload = () => {
            ["GITHUB_USER", "REPO_NAME", "GITHUB_PAT", "taskSelect"].forEach(id => {
                if(localStorage.getItem(id)) document.getElementById(id).value = localStorage.getItem(id);
            });
            updateTaskFields();
            
            // 깃허브 정보가 있으면 자동으로 모델 리스트를 가져옴
            if(document.getElementById("GITHUB_USER").value && document.getElementById("REPO_NAME").value) {
                fetchGroqModels();
            }
        };

        // 핵심: 깃허브 원본 파일(Raw URL)에서 models.json을 읽어옵니다.
        async function fetchGroqModels() {
            const user = document.getElementById("GITHUB_USER").value;
            const repo = document.getElementById("REPO_NAME").value;

            if (!user || !repo) {
                alert("깃허브 아이디와 레포지토리 이름을 먼저 입력해주세요!"); return;
            }

            const select = document.getElementById("modelSelect");
            select.innerHTML = '<option>깃허브에서 모델 목록 불러오는 중...</option>';

            // Raw URL 구조 (캐시 무시를 위해 현재 시간 파라미터 추가)
            const url = `https://raw.githubusercontent.com/${user}/${repo}/main/models.json?t=${new Date().getTime()}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("아직 models.json 파일이 없습니다. 깃허브 액션에서 'Update Groq Models List'를 먼저 한 번 실행해주세요!");
                
                const data = await response.json();
                const models = data.data.filter(m => !m.id.includes("whisper"));
                
                select.innerHTML = '';
                models.forEach(model => {
                    const option = document.createElement("option");
                    option.value = model.id;
                    option.text = model.id;
                    if(localStorage.getItem("modelSelect") === model.id) option.selected = true;
                    select.appendChild(option);
                });
                
                updateModelDesc();
                
            } catch (error) {
                alert(error.message);
                select.innerHTML = '<option value="">목록 불러오기 실패</option>';
            }
        }

        function updateModelDesc() {
            const modelId = document.getElementById('modelSelect').value.toLowerCase();
            let desc = "강점: Groq에서 제공하는 최신 모델입니다.";
            if (modelId.includes("70b")) desc = "강점: 복잡한 논리, 긴 계약서 문맥 이해, 가장 똑똑한 판단(Risk Management) 필요 시 추천!";
            else if (modelId.includes("8b")) desc = "강점: 미친 처리 속도. 단순 데이터 분류, 실시간 크롤링 요약, 가성비 작업에 최적화!";
            else if (modelId.includes("mixtral")) desc = "강점: 다국어 처리에 강함. 글로벌 BPO 업무나 창의적 글쓰기에 추천!";
            else if (modelId.includes("gemma")) desc = "강점: 구글에서 만든 경량 모델. 빠르고 효율적인 텍스트 생성에 적합합니다.";
            
            document.getElementById('modelDesc').innerText = desc;
            localStorage.setItem("modelSelect", document.getElementById('modelSelect').value);
        }

        function updateTaskFields() {
            const task = document.getElementById('taskSelect').value;
            const container = document.getElementById('apiFields');
            let html = '<p class="info-text">선택한 직무에 필요한 추가 API 키를 입력하세요 (선택사항).</p>';
            taskApis[task].forEach(field => {
                const val = localStorage.getItem(field) || "";
                html += `<label>${field}</label><input type="password" class="extra-api" id="${field}" value="${val}">`;
            });
            container.innerHTML = html;
        }

        async function saveAndRun() {
            ["GITHUB_USER", "REPO_NAME", "GITHUB_PAT", "taskSelect"].forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value);
            });

            let extraKeys = {};
            document.querySelectorAll('.extra-api').forEach(input => {
                localStorage.setItem(input.id, input.value);
                extraKeys[input.id] = input.value;
            });

            const user = document.getElementById("GITHUB_USER").value;
            const repo = document.getElementById("REPO_NAME").value;
            const pat = document.getElementById("GITHUB_PAT").value;
            const model = document.getElementById("modelSelect").value;
            const task = document.getElementById("taskSelect").value;

            if (!pat || !user || !repo || !model) {
                alert("필수 정보(깃허브 브릿지 및 모델 선택)를 모두 확인해주세요!"); return;
            }

            const url = `https://api.github.com/repos/${user}/${repo}/actions/workflows/lobster_army.yml/dispatches`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: { model: model, task: task, extra_keys: JSON.stringify(extraKeys) }
                    })
                });

                if (response.ok) alert("🚀 명령 하달 완료! 디스코드를 확인하세요.");
                else { const err = await response.json(); alert("호출 실패: " + err.message); }
            } catch (e) { alert("네트워크 에러: " + e.message); }
        }
    </script>
</body>
</html>

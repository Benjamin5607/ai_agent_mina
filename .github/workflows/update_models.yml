name: Update API Models List

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Models from Groq and Gemini
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Groq 모델 가져오기
          curl -s -X GET "https://api.groq.com/openai/v1/models" -H "Authorization: Bearer $GROQ_API_KEY" | jq '.' > models.json
          
          # Gemini 모델 가져오기
          curl -s -X GET "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" | jq '.' > gemini_models.json

      - name: Commit and Push
        run: |
          git config --global user.name "Lobster-Bot"
          git config --global user.email "bot@lobster.local"
          git add models.json gemini_models.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 랍스타 봇: Groq & Gemini 모델 리스트 업데이트" && git push)

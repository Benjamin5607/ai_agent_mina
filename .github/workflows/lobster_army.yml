name: Lobster Agent Trigger

on:
  workflow_dispatch:
    inputs:
      user_message:
        description: '사용자 메시지 (대화 또는 지시)'
        required: true
        default: '안녕?'
      model:
        description: 'Groq Model'
        required: true
        default: 'llama-3.3-70b-versatile'
      gemini_model:
        description: 'Gemini Model'
        required: true
        default: 'models/gemini-1.5-flash'
      task:
        description: 'Assigned Task'
        required: true
        default: 'ops_risk'

jobs:
  run-lobster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute Lobster Brain
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          USER_MESSAGE: ${{ github.event.inputs.user_message }}
          LOBSTER_MODEL: ${{ github.event.inputs.model }}
          GEMINI_MODEL: ${{ github.event.inputs.gemini_model }}
          LOBSTER_TASK: ${{ github.event.inputs.task }}
        run: python main.py

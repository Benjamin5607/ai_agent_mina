name: Lobster Agent Trigger

on:
  workflow_dispatch:
    inputs:
      user_message:
        description: '사용자 메시지'
        required: true
        default: '안녕?'
      model:
        description: 'Groq Model'
        required: true
        default: 'llama-3.3-70b-versatile'
      gemini_model:
        description: 'Gemini Model'
        required: true
        default: 'models/gemini-1.5-flash'
      task:
        description: 'Assigned Task'
        required: true
        default: 'ops_risk'
      extra_keys:
        description: 'Extra API Keys (JSON)'
        required: false
        default: '{}'

jobs:
  run-lobster:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 랍스타가 기억(일기장)을 저장할 수 있게 허락하는 권한

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute Lobster Brain
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 대시보드에서 보낸 데이터를 환경변수로 연결
          USER_MESSAGE: ${{ inputs.user_message }}
          LOBSTER_MODEL: ${{ inputs.model }}
          GEMINI_MODEL: ${{ inputs.gemini_model }}
          LOBSTER_TASK: ${{ inputs.task }}
          EXTRA_KEYS_JSON: ${{ inputs.extra_keys }}
        run: python main.py

      - name: Save Lobster Memory
        run: |
          git config --global user.name "Lobster-Memory"
          git config --global user.email "memory@lobster.local"
          git add memory.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🧠 랍스타 단기 기억 업데이트" && git push)
